             echo "Failed to extract PIPELINE_ID from terraform state! Falling back to CLI search..."
             PIPELINE_ID=$(databricks pipelines list --output JSON | jq -r '.[] | select(.name == "[prod] trvrda_etl") | .pipeline_id' | head -n 1)
          fi
          
          if [ -z "$PIPELINE_ID" ]; then
            echo "Error: Could not find Pipeline ID."
            exit 1
          fi
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT
          echo "Pipeline ID: $PIPELINE_ID"
          
          # Check for existing active update to avoid "active update exists" error
          echo "Checking for active updates..."
          ACTIVE_UPDATE=$(databricks pipelines list-updates $PIPELINE_ID --output JSON | jq -r '.updates[]? | select(.state == "INITIALIZING" or .state == "SETTING_UP" or .state == "RUNNING" or .state == "STARTING" or .state == "QUEUED" or .state == "WAITING_FOR_RESOURCES") | .update_id' | head -n 1)
          
          if [[ -n "$ACTIVE_UPDATE" && "$ACTIVE_UPDATE" != "null" ]]; then
            echo "Found active update: $ACTIVE_UPDATE. Adopting it."
            UPDATE_ID=$ACTIVE_UPDATE
          else
            echo "Triggering new pipeline update..."
            RESPONSE=$(databricks api post /api/2.0/pipelines/$PIPELINE_ID/updates --json "{}" || true)
