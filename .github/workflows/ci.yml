      - name: Monitor Pipeline Run (Prod)
        id: monitor
        run: |
          PIPELINE_ID=${{ steps.run_pipeline.outputs.pipeline_id }}
          UPDATE_ID=${{ steps.run_pipeline.outputs.update_id }}
          echo "Monitoring Update: $UPDATE_ID for Pipeline: $PIPELINE_ID"
          STATE="INITIALIZING"
          MAX_RETRIES=5
