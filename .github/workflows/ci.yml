name: CI-CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  dev-pipeline:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python & CLI
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest jq
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          # Force GitHub Actions to use latest CLI
          export PATH=/usr/local/bin:$PATH
          databricks --version

      - name: Run Unit Tests
        run: pytest tests/

      - name: Validate Databricks Bundle (Dev)
        working-directory: trvrda
        run: databricks bundle validate -t dev

      - name: Deploy Databricks Bundle (Dev)
        working-directory: trvrda
        run: databricks bundle deploy -t dev

      - name: Trigger Databricks Pipeline (Dev)
        id: run_pipeline
        working-directory: trvrda
        run: |
          # Use bundle run to trigger. In development mode, it might try to monitor.
          # We manually trigger and then poll to avoid the event-fetching bug.
          PIPELINE_ID=$(databricks bundle deploy -t dev --output json | jq -r '.resources.pipelines.trvrda_etl.id')
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT
          databricks pipelines run $PIPELINE_ID

      - name: Monitor Pipeline Run (Dev)
        id: monitor
        run: |
          PIPELINE_ID=${{ steps.run_pipeline.outputs.pipeline_id }}
          echo "Monitoring pipeline: $PIPELINE_ID"
          STATE="INITIALIZING"
          while [[ "$STATE" == "INITIALIZING" || "$STATE" == "SETTING_UP" || "$STATE" == "RUNNING" || "$STATE" == "STARTING" ]]; do
            sleep 30
            STATE=$(databricks pipelines get $PIPELINE_ID --output JSON | jq -r '.latest_update.state // "UNKNOWN"')
            echo "Current state: $STATE"
            if [[ "$STATE" == "COMPLETED" || "$STATE" == "FINISHED" ]]; then
              echo "Pipeline completed successfully."
              exit 0
            fi
            if [[ "$STATE" == "FAILED" || "$STATE" == "CANCELED" ]]; then
              echo "Pipeline failed with state: $STATE"
              exit 1
            fi
          done

  prod-pipeline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python & CLI
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest jq
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          export PATH=/usr/local/bin:$PATH
          databricks --version

      - name: Run Unit Tests
        run: pytest tests/

      - name: Validate Databricks Bundle (Prod)
        working-directory: trvrda
        run: databricks bundle validate -t prod

      - name: Deploy Databricks Bundle (Prod)
        working-directory: trvrda
        run: databricks bundle deploy -t prod

      - name: Trigger Databricks Pipeline (Prod)
        id: run_pipeline
        working-directory: trvrda
        run: |
          PIPELINE_ID=$(databricks bundle deploy -t prod --output json | jq -r '.resources.pipelines.trvrda_etl.id')
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT
          databricks pipelines run $PIPELINE_ID

      - name: Monitor Pipeline Run (Prod)
        id: monitor
        run: |
          PIPELINE_ID=${{ steps.run_pipeline.outputs.pipeline_id }}
          echo "Monitoring pipeline: $PIPELINE_ID"
          STATE="INITIALIZING"
          while [[ "$STATE" == "INITIALIZING" || "$STATE" == "SETTING_UP" || "$STATE" == "RUNNING" || "$STATE" == "STARTING" ]]; do
            sleep 30
            STATE=$(databricks pipelines get $PIPELINE_ID --output JSON | jq -r '.latest_update.state // "UNKNOWN"')
            echo "Current state: $STATE"
            if [[ "$STATE" == "COMPLETED" || "$STATE" == "FINISHED" ]]; then
              echo "Pipeline completed successfully."
              exit 0
            fi
            if [[ "$STATE" == "FAILED" || "$STATE" == "CANCELED" ]]; then
              echo "Pipeline failed with state: $STATE"
              exit 1
            fi
          done
