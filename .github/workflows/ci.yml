            if echo "$RESPONSE" | grep -q "already exists"; then
               UPDATE_ID=$(databricks pipelines list-updates $PIPELINE_ID --output JSON | jq -r '.updates[0].update_id')
               echo "Race condition detected. Adopting latest update ID: $UPDATE_ID"
            else
