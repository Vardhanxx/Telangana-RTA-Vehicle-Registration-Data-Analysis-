name: CI-CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  dev-pipeline:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python & CLI
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest jq
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          # Force GitHub Actions to use latest CLI
          export PATH=/usr/local/bin:$PATH
          databricks --version

      - name: Run Unit Tests
        run: pytest tests/

      - name: Validate Databricks Bundle (Dev)
        working-directory: trvrda
        run: databricks bundle validate -t dev

      - name: Deploy Databricks Bundle (Dev)
        working-directory: trvrda
        run: databricks bundle deploy -t dev

      - name: Trigger Databricks Pipeline (Dev)
        id: run_pipeline
        working-directory: trvrda
        run: |
          PIPELINE_ID="trvrda_etl"
          echo "Triggering pipeline: $PIPELINE_ID"
          databricks pipelines run $PIPELINE_ID --output JSON
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT

      - name: Monitor Pipeline Run (Dev)
        id: monitor
        run: |
          PIPELINE_ID=${{ steps.run_pipeline.outputs.pipeline_id }}
          STATUS="RUNNING"
          echo "Monitoring pipeline: $PIPELINE_ID"
          while [ "$STATUS" == "RUNNING" ]; do
            sleep 30
            STATUS=$(databricks pipelines get $PIPELINE_ID --output JSON | jq -r '.latest_update.state // "RUNNING"')
            echo "Pipeline status: $STATUS"
          done
          echo "Final pipeline status: $STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Pipeline $PIPELINE_ID finished with status $STATUS"

  prod-pipeline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python & CLI
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest jq
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          export PATH=/usr/local/bin:$PATH
          databricks --version

      - name: Run Unit Tests
        run: pytest tests/

      - name: Validate Databricks Bundle (Prod)
        working-directory: trvrda
        run: databricks bundle validate -t prod

      - name: Deploy Databricks Bundle (Prod)
        working-directory: trvrda
        run: databricks bundle deploy -t prod

      - name: Trigger Databricks Pipeline (Prod)
        id: run_pipeline
        working-directory: trvrda
        run: |
          PIPELINE_ID="trvrda_etl"
          echo "Triggering pipeline: $PIPELINE_ID"
          databricks pipelines run $PIPELINE_ID --output JSON
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT

      - name: Monitor Pipeline Run (Prod)
        id: monitor
        run: |
          PIPELINE_ID=${{ steps.run_pipeline.outputs.pipeline_id }}
          STATUS="RUNNING"
          echo "Monitoring pipeline: $PIPELINE_ID"
          while [ "$STATUS" == "RUNNING" ]; do
            sleep 30
            STATUS=$(databricks pipelines get $PIPELINE_ID --output JSON | jq -r '.latest_update.state // "RUNNING"')
            echo "Pipeline status: $STATUS"
          done
          echo "Final pipeline status: $STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Pipeline $PIPELINE_ID finished with status $STATUS"