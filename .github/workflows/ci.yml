              fi
              echo "Pipeline update $UPDATE_ID failed with state: $STATE"
              echo "Retrieving pipeline logs for diagnostics..."
              (cd trvrda && databricks pipelines logs --update-id $UPDATE_ID || echo "No logs found.")
              exit 1
            fi
            
            # Reset failure count if we are in a valid progress state
            if [[ "$STATE" == "RUNNING" || "$STATE" == "WAITING_FOR_RESOURCES" ]]; then
                FAILED_COUNT=0
            fi
          done
