name: CI-CD

on:
  push:
    branches:
      - main
      - dev

jobs:
  dev-pipeline:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Run Unit Tests
        run: pytest tests/
      - name: Validate Databricks Bundle (Dev)
        working-directory: trvrda
        run: databricks bundle validate -t dev
      - name: Deploy Databricks Bundle (Dev)
        working-directory: trvrda
        run: databricks bundle deploy -t dev
      - name: Run Databricks Pipeline (Dev)
        working-directory: trvrda
        run: |
          databricks pipelines list --output json > pipelines.json
          PIPELINE_ID=$(jq -r '.[] | select(.name=="[dev vardhanxxv] [dev] trvrda_etl") | .pipeline_id' pipelines.json)
          if [ -z "$PIPELINE_ID" ]; then echo "Pipeline not found!"; exit 1; fi
          databricks pipelines start --pipeline-id "$PIPELINE_ID"

  prod-pipeline:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      - name: Run Unit Tests
        run: pytest tests/
      - name: Validate Databricks Bundle (Prod)
        working-directory: trvrda
        run: databricks bundle validate -t prod
      - name: Deploy Databricks Bundle (Prod)
        working-directory: trvrda
        run: databricks bundle deploy -t prod
      - name: Run Databricks Pipeline (Prod)
        working-directory: trvrda
        run: |
          databricks pipelines list --output json > pipelines.json
          PIPELINE_ID=$(jq -r '.[] | select(.name=="[prod vardhanxxv] [prod] trvrda_etl") | .pipeline_id' pipelines.json)
          if [ -z "$PIPELINE_ID" ]; then echo "Pipeline not found!"; exit 1; fi
          databricks pipelines start --pipeline-id "$PIPELINE_ID"
