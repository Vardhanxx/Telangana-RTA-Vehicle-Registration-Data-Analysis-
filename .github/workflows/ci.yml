          while true; do
            sleep 30
            JSON_OUT=$(databricks pipelines get-update $PIPELINE_ID $UPDATE_ID --output JSON || echo '{"state": "UNKNOWN"}')
            STATE=$(echo $JSON_OUT | jq -r '.update.state // .state // "UNKNOWN"')
            echo "Current state: $STATE"
            
            if [[ "$STATE" == "COMPLETED" || "$STATE" == "FINISHED" ]]; then
              echo "Pipeline update $UPDATE_ID completed successfully."
              exit 0
            fi
            
            if [[ "$STATE" == "FAILED" || "$STATE" == "CANCELED" ]]; then
              # If we just started, give it one more chance in case of transient API issues
              if [[ $FAILED_COUNT -lt $MAX_RETRIES ]]; then
